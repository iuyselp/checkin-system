server:
  port: 8080
  servlet:
    context-path: /api

spring:
  application:
    name: checkin-system
  
  # 数据源配置
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/checkin?useUnicode=true&characterEncoding=utf-8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: root
    password: root123
  
  # Redis 配置
  data:
    redis:
      host: localhost
      port: 6379
      password: 
      database: 0
      timeout: 5000ms
      lettuce:
        pool:
          max-active: 8
          max-idle: 8
          min-idle: 0
          max-wait: -1ms

  # Jackson 配置
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: Asia/Shanghai
    serialization:
      write-dates-as-timestamps: false

# MyBatis-Plus 配置
mybatis-plus:
  mapper-locations: classpath*:/mapper/**/*.xml
  type-aliases-package: com.checkin.entity
  global-config:
    db-config:
      id-type: assign_id  # 使用雪花算法生成 ID
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
    # 关闭二级缓存避免兼容性问题
    cache-enabled: false

# JWT 配置
jwt:
  secret: checkin-system-secret-key-2024-must-be-long-enough-for-security
  expiration: 7200000  # 2 小时
  refresh-expiration: 604800000  # 7 天
  header: Authorization
  prefix: Bearer 

# 日志配置
logging:
  level:
    root: INFO
    com.checkin: DEBUG
  pattern:
    console: '%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{50} - %msg%n'

# 打卡配置
checkin:
  # 默认打卡有效半径（米）
  default-radius: 100
  # 迟到容忍时间（分钟）
  late-grace-minutes: 10
  # 早退容忍时间（分钟）
  early-grace-minutes: 10
